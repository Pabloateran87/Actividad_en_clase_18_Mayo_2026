<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Habilidades para la Vida</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-section {
            padding: 30px;
        }
        
        #chatbox {
            height: 450px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
            max-width: 80%;
            animation: slideIn 0.3s ease-in-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-message {
            background: #1e88e5;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .bot-message {
            background: #e8f5e9;
            color: #2e7d32;
            margin-right: auto;
            border-left: 4px solid #43a047;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        #user-input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        #user-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .secondary-btn {
            background: #f0f0f0;
            color: #333;
            padding: 10px 16px;
            font-size: 13px;
            flex: 1;
            min-width: 120px;
        }
        
        .secondary-btn:hover {
            background: #e0e0e0;
        }
        
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin: 0 2px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .status {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tu rincón U</h1>
            <p>Conversaciones de apoyo emocional y desarrollo personal</p>
        </div>
        
        <div class="chat-section">
            <!-- Área de chat -->
            <div id="chatbox"></div>
            
            <!-- Área de entrada -->
            <div class="input-area">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Cuéntame cómo te sientes..." 
                    autocomplete="off"
                />
                <button onclick="sendMessage()">Enviar</button>
            </div>
            
            <!-- Botones de acciones -->
            <div class="button-group">
                <button class="secondary-btn" onclick="exportPDF()">📥 Descargar Sesión</button>
                <button class="secondary-btn" onclick="getSessionInfo()">ℹ️ Info Sesión</button>
                <button class="secondary-btn" onclick="clearChat()">🗑️ Nueva Sesión</button>
            </div>
            
            <!-- Estado -->
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        /**
         * EXPLICACIÓN DE SESIONES SIN LOGIN:
         * 
         * 1. Flask crea automáticamente una COOKIE en tu navegador
         * 2. Esa cookie contiene un ID único (UUID)
         * 3. Cada vez que haces un request, la cookie se envía automáticamente
         * 4. Flask recognoce quién eres por la cookie (sin login)
         * 5. Tu historial se vincula a esa cookie
         * 
         * ¿Qué pasa si:
         * - Cierras el navegador: La cookie persiste (puedes volver a tu conversación)
         * - Abres en incógnito: Nueva cookie = nueva sesión
         * - Borras cookies: Nueva cookie = nueva sesión
         */
        
        /**
         * ENVIAR MENSAJE
         * - NO enviamos session_id en el JSON (Flask lo obtiene de la cookie)
         * - Flask reconoce automáticamente quién eres
         */
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Mostrar mensaje del usuario
            addMessage(message, 'user');
            input.value = '';
            input.disabled = true;
            updateStatus('Procesando...');
            
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'same-origin',  // Incluir cookies en la petición
                    body: JSON.stringify({message: message})
                    // ← NO enviamos session_id (Flask la obtiene de la cookie)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    addMessage(data.reply, 'bot');
                    updateStatus('Conectado');
                } else {
                    addMessage('⚠️ Error: ' + data.error, 'bot');
                    updateStatus('Error');
                }
            } catch (error) {
                addMessage('⚠️ Error de conexión: ' + error.message, 'bot');
                updateStatus('Error de conexión');
            } finally {
                input.disabled = false;
                input.focus();
            }
        }
        
        /**
         * AGREGAR MENSAJE AL CHAT
         */
        function addMessage(text, sender) {
            const chatbox = document.getElementById('chatbox');
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
            
            const label = sender === 'user' ? '👤 Tú:' : '🤖 Asistente:';
            div.innerHTML = `<strong>${label}</strong><br>${text}`;
            
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
        
        /**
         * EXPORTAR SESIÓN A PDF
         * - Antes: Enviábamos session_id en POST
         * - Ahora: Solo GET /export (Flask obtiene session_id de la cookie)
         */
        async function exportPDF() {
            try {
                updateStatus('Generando PDF...');
                const res = await fetch('/exportar', {
                    credentials: 'same-origin'  // Incluir cookies en la petición
                });
                // ← Simplemente GET sin parámetros
                
                if (res.ok) {
                    // Descargar el PDF
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `sesion_${new Date().getTime()}.pdf`;
                    a.click();
                    updateStatus('PDF descargado ✓');
                } else {
                    const error = await res.json();
                    alert('Error: ' + error.error);
                    updateStatus('Error al descargar');
                }
            } catch (error) {
                alert('Error: ' + error.message);
                updateStatus('Error');
            }
        }
        
        /**
         * OBTENER INFORMACIÓN DE LA SESIÓN
         * - Devuelve: ID, fecha, cantidad de mensajes
         */
        async function getSessionInfo() {
            try {
                const res = await fetch('/sesion');
                const data = await res.json();
                
                if (res.ok) {
                    alert(`
📊 Información de tu Sesión:

ID: ${data.id}
Fecha: ${new Date(data.fecha_creacion).toLocaleString('es-ES')}
Cantidad de mensajes: ${data.cantidad_mensajes || 0}
                    `);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        /**
         * LIMPIAR CHAT (nueva sesión)
         */
        function clearChat() {
            if (confirm('¿Estás seguro de que deseas iniciar una nueva sesión?\n(Tu historial anterior se mantendrá en el servidor para exportar)')) {
                document.getElementById('chatbox').innerHTML = '';
                document.getElementById('user-input').value = '';
                updateStatus('Nueva sesión iniciada');
            }
        }
        
        /**
         * ACTUALIZAR ESTADO
         */
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }
        
        /**
         * EVENT LISTENERS
         */
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Mensaje de bienvenida
        window.addEventListener('load', () => {
            addMessage('¡Hola! Soy tu asistente de habilidades para la vida. ¿Cómo puedo ayudarte hoy?', 'bot');
            addMessage('⚠️ IMPORTANTE: Este chatbot es una herramienta de apoyo educativo y NO sustituye la atención de un profesional de la salud mental. Si experimentas angustia severa o crisis emocional, por favor busca ayuda profesional inmediata.', 'bot');
            updateStatus('Conectado');
        });
    </script>
</body>
</html>
